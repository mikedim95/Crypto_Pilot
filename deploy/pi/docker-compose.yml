services:
  backend:
    image: docker.io/${DOCKERHUB_NAMESPACE:-mikedim95}/mytrader-backend:${BACKEND_TAG:-latest}
    container_name: mytrader-backend
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 384m
    environment:
      PORT: "3001"
      APP_VERSION: "${BACKEND_TAG:-latest}"
      NODE_OPTIONS: "${BACKEND_NODE_OPTIONS:---max-old-space-size=192}"
      ASIC_ONLY_MODE: "${ASIC_ONLY_MODE:-true}"
      CORS_ORIGIN: "http://${PI_HOST_OR_IP:-localhost}:8080,http://localhost:8080"
      MYAPP_DB_HOST: "mysql"
      MYAPP_DB_PORT: "3306"
      MYAPP_DB_NAME: "${MYSQL_DATABASE:-mytrader}"
      MYAPP_DB_USER: "${MYSQL_USER:-mytrader}"
      MYAPP_DB_PASSWORD: "${MYSQL_PASSWORD:-change-me}"
      MYAPP_DB_CONNECTION_LIMIT: "${MYAPP_DB_CONNECTION_LIMIT:-3}"
      USER_CREDENTIALS_SECRET: "${USER_CREDENTIALS_SECRET:-change-this-user-credentials-secret}"
      STRATEGY_STORE_PATH: "/app/data/strategy-store.json"
      STRATEGY_DB_INIT_RETRY_INTERVAL_MS: "${STRATEGY_DB_INIT_RETRY_INTERVAL_MS:-5000}"
      STRATEGY_DB_INIT_MAX_RETRIES: "${STRATEGY_DB_INIT_MAX_RETRIES:-12}"
      MINER_INGEST_URL: "${MINER_INGEST_URL:-}"
      MINER_INGEST_TOKEN: "${MINER_INGEST_TOKEN:-}"
      MINER_POLL_MS: "${MINER_POLL_MS:-60000}"
      MINER_POLL_CONCURRENCY: "${MINER_POLL_CONCURRENCY:-1}"
      MINER_SNAPSHOT_RETENTION_DAYS: "${MINER_SNAPSHOT_RETENTION_DAYS:-7}"
      MINER_PUSH_SOURCE: "${MINER_PUSH_SOURCE:-pi}"
      MINER_PUSH_TIMEOUT_MS: "${MINER_PUSH_TIMEOUT_MS:-8000}"
      STRATEGY_REQUIRE_APPROVAL_FOR_REAL_RUNS: "${STRATEGY_REQUIRE_APPROVAL_FOR_REAL_RUNS:-true}"
      STRATEGY_GLOBAL_KILL_SWITCH: "${STRATEGY_GLOBAL_KILL_SWITCH:-false}"
      BACKTEST_PREVIEW_CACHE_TTL_MS: "${BACKTEST_PREVIEW_CACHE_TTL_MS:-60000}"
      HISTORICAL_CANDLE_RETENTION_DAYS: "${HISTORICAL_CANDLE_RETENTION_DAYS:-540}"
      HISTORICAL_CANDLE_REQUEST_DELAY_MS: "${HISTORICAL_CANDLE_REQUEST_DELAY_MS:-250}"
      HISTORICAL_CANDLE_MAX_RETRIES: "${HISTORICAL_CANDLE_MAX_RETRIES:-3}"
      HISTORICAL_CANDLE_FETCH_LIMIT: "${HISTORICAL_CANDLE_FETCH_LIMIT:-500}"
      HISTORICAL_CANDLE_RETRY_BASE_DELAY_MS: "${HISTORICAL_CANDLE_RETRY_BASE_DELAY_MS:-750}"
      STRATEGY_JOB_RETRY_BASE_DELAY_MS: "${STRATEGY_JOB_RETRY_BASE_DELAY_MS:-30000}"
      STRATEGY_JOB_MAX_ATTEMPTS: "${STRATEGY_JOB_MAX_ATTEMPTS:-3}"
      EXECUTION_GUARDRAIL_MIN_CONFIDENCE: "${EXECUTION_GUARDRAIL_MIN_CONFIDENCE:-0.55}"
      EXECUTION_GUARDRAIL_MAX_POSITION_SIZE_PCT: "${EXECUTION_GUARDRAIL_MAX_POSITION_SIZE_PCT:-25}"
      EXECUTION_GUARDRAIL_MAX_BTC_EXPOSURE_PCT: "${EXECUTION_GUARDRAIL_MAX_BTC_EXPOSURE_PCT:-55}"
      EXECUTION_GUARDRAIL_COOLDOWN_MINUTES: "${EXECUTION_GUARDRAIL_COOLDOWN_MINUTES:-60}"
      EXECUTION_GUARDRAIL_MAX_DAILY_TURNOVER_PCT: "${EXECUTION_GUARDRAIL_MAX_DAILY_TURNOVER_PCT:-75}"
      EXECUTION_GUARDRAIL_NEWS_SHOCK_BEARISH_BIAS: "${EXECUTION_GUARDRAIL_NEWS_SHOCK_BEARISH_BIAS:--6}"
      EXECUTION_GUARDRAIL_VOLATILITY_LOCKOUT: "${EXECUTION_GUARDRAIL_VOLATILITY_LOCKOUT:-0.08}"
      EXECUTION_GUARDRAIL_MILD_REDUCTION_FACTOR: "${EXECUTION_GUARDRAIL_MILD_REDUCTION_FACTOR:-0.5}"
    volumes:
      - backend_data:/app/data
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: docker.io/${DOCKERHUB_NAMESPACE:-mikedim95}/mytrader-frontend:${FRONTEND_TAG:-latest}
    container_name: mytrader-frontend
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 96m
    depends_on:
      - backend
    ports:
      - "8080:80"

  mysql:
    image: mysql:8.0
    container_name: mytrader-mysql
    restart: unless-stopped
    mem_limit: 384m
    memswap_limit: 512m
    command:
      [
        "--default-authentication-plugin=mysql_native_password",
        "--performance-schema=OFF",
        "--innodb-buffer-pool-size=128M",
        "--innodb-log-buffer-size=8M",
        "--max-connections=25",
        "--table-open-cache=200",
        "--tmp-table-size=16M",
        "--max-heap-table-size=16M",
        "--skip-host-cache",
      ]
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-mytrader}"
      MYSQL_USER: "${MYSQL_USER:-mytrader}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-change-me}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-me}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-p${MYSQL_ROOT_PASSWORD:-change-me}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  backend_data:
  mysql_data:
